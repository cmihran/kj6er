<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Dominator single-element end-fed halfwave antenna">
  <!-- ground line -->
  <line x1="20" y1="170" x2="300" y2="170" stroke="#1c1812" stroke-width="0.5" stroke-dasharray="2 3" opacity="0.45"/>

  <!-- ground spike -->
  <path d="M 160 170 L 156 184 L 164 184 Z" fill="#1c1812" opacity="0.7"/>

  <!-- mast / base section -->
  <line x1="160" y1="170" x2="160" y2="149" stroke="#1c1812" stroke-width="2.4"/>

  <!-- driven element (½λ vertical) -->
  <line x1="160" y1="149" x2="160" y2="22" stroke="#8a2a1a" stroke-width="2.2" stroke-linecap="round"/>
  <circle cx="160" cy="22" r="2.2" fill="#8a2a1a"/>

  <!-- 49:1 unun box at feedpoint (below challenger's 4:1) -->
  <rect x="153" y="140" width="14" height="9" fill="#efe6cd" stroke="#1c1812" stroke-width="0.9"/>

  <!-- drooping counterpoise wire from feedpoint -->
  <path d="M 167 145 Q 172 172, 230 168" stroke="#8a5a18" stroke-width="1.1" fill="none"/>

  <!-- labels -->
  <text x="172" y="60" font-family="IBM Plex Mono, monospace" font-size="8" fill="#8a2a1a" letter-spacing="0.06em">½λ</text>
  <text x="148" y="147" text-anchor="end" font-family="IBM Plex Mono, monospace" font-size="7" fill="#1c1812" opacity="0.7" letter-spacing="0.06em">49:1</text>
</svg>
