<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Dominator end-fed halfwave with 2-element parasitic array">
  <!-- ground line -->
  <line x1="20" y1="170" x2="300" y2="170" stroke="#1c1812" stroke-width="0.5" stroke-dasharray="2 3" opacity="0.45"/>

  <!-- driven element (left) -->
  <path d="M 120 170 L 116 184 L 124 184 Z" fill="#1c1812" opacity="0.7"/>
  <line x1="120" y1="170" x2="120" y2="28" stroke="#8a2a1a" stroke-width="2.2" stroke-linecap="round"/>
  <circle cx="120" cy="28" r="2.2" fill="#8a2a1a"/>

  <!-- 49:1 unun box at base -->
  <rect x="113" y="160" width="14" height="9" fill="#efe6cd" stroke="#1c1812" stroke-width="0.9"/>

  <!-- coax to ground -->
  <path d="M 120 169 Q 138 175, 158 168" stroke="#1c1812" stroke-width="0.9" fill="none"/>

  <!-- parasitic element (right, dashed) -->
  <path d="M 220 170 L 216 184 L 224 184 Z" fill="#1c1812" opacity="0.55"/>
  <line x1="220" y1="170" x2="220" y2="32" stroke="#8a5a18" stroke-width="2" stroke-linecap="round" stroke-dasharray="4 2.5"/>
  <circle cx="220" cy="32" r="2" fill="#8a5a18"/>

  <!-- DX direction arrow -->
  <path d="M 250 70 L 290 70 M 285 65 L 290 70 L 285 75" stroke="#8a2a1a" stroke-width="1.1" fill="none" opacity="0.7"/>
  <text x="270" y="60" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="8" fill="#8a2a1a" opacity="0.85" letter-spacing="0.08em">DX</text>

  <!-- labels -->
  <text x="120" y="195" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="7" fill="#1c1812" opacity="0.7">DRIVEN</text>
  <text x="220" y="195" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="7" fill="#1c1812" opacity="0.7">PARASITIC</text>
</svg>
