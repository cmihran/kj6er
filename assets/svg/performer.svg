<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="PERformer quarterwave vertical with two elevated radials">
  <!-- ground line -->
  <line x1="20" y1="170" x2="300" y2="170" stroke="#1c1812" stroke-width="0.5" stroke-dasharray="2 3" opacity="0.45"/>

  <!-- ground spike -->
  <path d="M 160 170 L 156 184 L 164 184 Z" fill="#1c1812" opacity="0.7"/>

  <!-- whip -->
  <line x1="160" y1="170" x2="160" y2="22" stroke="#8a2a1a" stroke-width="2.2" stroke-linecap="round"/>
  <circle cx="160" cy="22" r="2.2" fill="#8a2a1a"/>

  <!-- elevated feedpoint / unun box -->
  <rect x="153" y="120" width="14" height="9" fill="#efe6cd" stroke="#1c1812" stroke-width="0.9"/>

  <!-- two elevated tuned radials -->
  <line x1="160" y1="125" x2="60" y2="160" stroke="#8a5a18" stroke-width="1.2"/>
  <line x1="160" y1="125" x2="260" y2="160" stroke="#8a5a18" stroke-width="1.2"/>

  <!-- elevation poles -->
  <line x1="60" y1="160" x2="60" y2="170" stroke="#1c1812" stroke-width="1"/>
  <line x1="260" y1="160" x2="260" y2="170" stroke="#1c1812" stroke-width="1"/>
  <circle cx="60" cy="160" r="1.6" fill="#1c1812"/>
  <circle cx="260" cy="160" r="1.6" fill="#1c1812"/>

  <!-- band labels along whip -->
  <text x="172" y="48" font-family="IBM Plex Mono, monospace" font-size="8" fill="#8a2a1a" letter-spacing="0.06em">¼λ</text>
</svg>
