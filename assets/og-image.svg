<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid meet">
  <!-- Cream paper background -->
  <rect width="1200" height="630" fill="#faf2de"/>

  <!-- Outer hairline frame -->
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="#c6b98f" stroke-width="2"/>
  <rect x="56" y="56" width="1088" height="518" fill="none" stroke="#d9cfa9" stroke-width="1"/>

  <!-- Corner labels (mono uppercase) -->
  <g font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="20" letter-spacing="3" fill="#70654d">
    <text x="80" y="100">RADIO STATION</text>
    <text x="1120" y="100" text-anchor="end" fill="#8a2a1a">AMATEUR EXTRA</text>
    <text x="80" y="560">CAMPBELL, CA</text>
    <text x="1120" y="560" text-anchor="end" fill="#1f5967">GRID CM97AG</text>
  </g>

  <!-- Eyebrow stamp -->
  <g transform="translate(600, 175)">
    <rect x="-260" y="-26" width="520" height="44" fill="none" stroke="#8a2a1a" stroke-width="2" rx="2"/>
    <text x="0" y="6" text-anchor="middle"
          font-family="'IBM Plex Mono', ui-monospace, monospace"
          font-size="18" letter-spacing="5" fill="#8a2a1a">LICENSED 1987 · ITU 6 · CQ 3</text>
  </g>

  <!-- Big callsign -->
  <text x="600" y="320" text-anchor="middle"
        font-family="'Space Grotesk','Inter',system-ui,sans-serif"
        font-weight="700" font-size="148" letter-spacing="-3" fill="#1c1812">KJ6ER</text>

  <!-- Name -->
  <text x="600" y="370" text-anchor="middle"
        font-family="'Inter', system-ui, sans-serif"
        font-weight="500" font-size="28" fill="#3b342a">Greg Mihran</text>

  <!-- Tagline -->
  <text x="600" y="440" text-anchor="middle"
        font-family="'Inter', system-ui, sans-serif"
        font-weight="400" font-size="22" fill="#1c1812">Always-free portable antenna plans for the every-ham.</text>
  <text x="600" y="472" text-anchor="middle"
        font-family="'Inter', system-ui, sans-serif"
        font-style="italic" font-weight="400" font-size="20" fill="#3b342a">Computer modeled, homebrewed, and field-tested.</text>

  <!-- Footer URL -->
  <text x="600" y="535" text-anchor="middle"
        font-family="'IBM Plex Mono', ui-monospace, monospace"
        font-size="22" letter-spacing="4" fill="#1f5967">KJ6ER.NET</text>
</svg>
